<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hridyanshu Singhal — Portfolio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:     #1A4FBF;
    --blue-lt:  #EEF3FC;
    --red:      #A63030;
    --red-lt:   #FAF0F0;
    --ink:      #111111;
    --mid:      #5A6A7E;
    --rule:     #D1D9E6;
    --offwhite: #F7F9FC;
    --bg:       #e8edf5;
    --nav-bg:   #f1f4f9;
    --white:    #ffffff;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
  }

  .shell {
    display: flex;
    height: 100vh;
  }

  /* ── NAV ── */
  .nav {
    width: 220px;
    min-width: 220px;
    background: var(--nav-bg);
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    transition: width 0.22s ease, min-width 0.22s ease;
    overflow: hidden;
  }
  .nav.collapsed { width: 52px; min-width: 52px; }

  .nav-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--rule);
    min-height: 52px;
  }
  .nav-logo {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .nav-logo .name {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
  }
  .nav-logo .role {
    font-size: 10px;
    color: var(--mid);
    white-space: nowrap;
    margin-top: 1px;
  }
  .nav.collapsed .nav-logo { display: none; }

  .toggle-btn {
    background: none; border: none; cursor: pointer;
    color: var(--mid); padding: 5px; border-radius: 5px;
    display: flex; align-items: center; font-size: 18px; flex-shrink: 0;
  }
  .toggle-btn:hover { background: var(--rule); color: var(--ink); }

  .nav-items { padding: 10px 8px; flex: 1; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 10px; border-radius: 7px; cursor: pointer;
    color: var(--mid); font-size: 13.5px;
    white-space: nowrap; overflow: hidden;
    border: none; background: none; width: 100%; text-align: left;
    transition: background 0.12s, color 0.12s;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--white); color: var(--ink); }
  .nav-item.active {
    background: var(--white);
    color: var(--blue);
    font-weight: 600;
    border-left: 3px solid var(--blue);
    padding-left: 8px;
  }
  .nav-item i { font-size: 17px; flex-shrink: 0; }
  .nav-item span { overflow: hidden; text-overflow: ellipsis; }
  .nav.collapsed .nav-item span { display: none; }
  .nav.collapsed .nav-item { justify-content: center; padding: 10px; border-left: none; }
  .nav.collapsed .nav-item.active { border-left: 3px solid var(--blue); padding-left: 7px; }

  .nav-footer {
    padding: 12px 14px;
    border-top: 1px solid var(--rule);
    font-size: 10px;
    color: var(--mid);
    line-height: 1.5;
    overflow: hidden;
    white-space: nowrap;
  }
  .nav.collapsed .nav-footer { display: none; }

  /* ── CONTENT ── */
  .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  .tab-panel { display: none; flex: 1; overflow: hidden; }
  .tab-panel.active { display: flex; flex-direction: column; }

  /* Resume tab — PDF iframe fills full height */
  #tab-resume iframe {
    width: 100%;
    flex: 1;
    border: none;
    display: block;
  }

  /* Case study tab — scrollable iframe */
  #tab-project iframe {
    width: 100%;
    flex: 1;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<div class="shell">

  <!-- LEFT NAV -->
  <nav class="nav" id="nav">
    <div class="nav-header">
      <div class="nav-logo">
        <span class="name">Hridyanshu Singhal</span>
      </div>
      <button class="toggle-btn" id="toggleBtn" aria-label="Toggle navigation">
        <i class="ti ti-layout-sidebar-left-collapse" id="toggleIcon"></i>
      </button>
    </div>

    <div class="nav-items">
      <button class="nav-item active" data-tab="resume">
        <i class="ti ti-file-text"></i>
        <span>Resume</span>
      </button>
      <button class="nav-item" data-tab="project">
        <i class="ti ti-brain"></i>
        <span>Project: AI CAM Agent (Voxar)</span>
      </button>
    </div>

    <div class="nav-footer">
      hridyanshu.singhal@gmail.com<br>
      +91-7999739858
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="content">

    <!-- TAB: RESUME — loads PDF from same repo folder -->
    <div class="tab-panel active" id="tab-resume">
      <iframe
        src="resume.pdf#toolbar=1&navpanes=0&scrollbar=1&view=FitH"
        title="Hridyanshu Singhal Resume"
      ></iframe>
    </div>

    <!-- TAB: CASE STUDY — loads case_study.html from same repo folder -->
    <div class="tab-panel" id="tab-project">
      <iframe
        src="case_study.html"
        title="AI PM Case Study"
      ></iframe>
    </div>

  </div>
</div>

<script>
  const nav = document.getElementById('nav');
  const toggleBtn = document.getElementById('toggleBtn');
  const toggleIcon = document.getElementById('toggleIcon');

  toggleBtn.addEventListener('click', () => {
    nav.classList.toggle('collapsed');
    const collapsed = nav.classList.contains('collapsed');
    toggleIcon.className = collapsed
      ? 'ti ti-layout-sidebar-left-expand'
      : 'ti ti-layout-sidebar-left-collapse';
  });

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
</script>

</body>
</html>
